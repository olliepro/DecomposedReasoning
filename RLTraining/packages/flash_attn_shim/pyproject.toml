[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "flash-attn"
version = "0.0.0"
description = "Metadata shim exposing flash_attn.bert_padding for Verl smoke runs."
requires-python = ">=3.12,<3.13"

[tool.setuptools.packages.find]
where = ["src"]
